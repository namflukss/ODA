<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f5f5f8" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ODA" />
<title>ODA — מתכונים לתינוק</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f8;
    --surface: #ffffff;
    --ink: #1c1c24;
    --ink-2: #71717f;
    --ink-3: #a3a3b0;
    --line: #ececf2;
    --accent: #5b4bd6;        /* friendly purple — white text passes AA */
    --accent-soft: #ece9fb;
    --r-md: 16px; --r-lg: 22px; --r-xl: 30px; --r-card: 30px; --r-full: 999px;
    --s-1: 8px; --s-2: 16px; --s-3: 24px; --s-4: 40px;
    --shadow: 0 10px 24px -16px rgba(28,28,40,.30);
    --shadow-lift: 0 26px 50px -22px rgba(28,28,40,.40);
    --shadow-art: 0 14px 32px -10px rgba(28,28,40,.35);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Rubik", "Assistant", "Heebo", -apple-system, BlinkMacSystemFont, "Arial Hebrew", Arial, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5; -webkit-font-smoothing: antialiased;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 4px var(--s-2) 150px; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-md); }

  /* ---------- Header ---------- */
  header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(245,245,248,.86); backdrop-filter: saturate(150%) blur(16px); -webkit-backdrop-filter: saturate(150%) blur(16px);
    padding: calc(env(safe-area-inset-top) + 16px) var(--s-2) 14px;
  }
  .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
  .brand { flex: 1; font-size: 22px; font-weight: 900; letter-spacing: 2px; color: var(--ink); }
  .h-btn {
    width: 46px; height: 46px; border-radius: 50%; border: 0; cursor: pointer;
    background: var(--accent); color: #fff; box-shadow: 0 10px 22px -8px rgba(91,75,214,.7);
    display: flex; align-items: center; justify-content: center; transition: transform .14s;
  }
  .h-btn:active { transform: scale(.92); }
  .search {
    margin: 14px auto 0; max-width: 900px; display: flex; align-items: center; gap: 11px;
    background: var(--surface); border-radius: var(--r-full); padding: 14px 18px; box-shadow: var(--shadow);
  }
  .search input { border: 0; outline: 0; font-size: 15px; width: 100%; background: transparent; color: var(--ink); font-family: inherit; }
  .search input::placeholder { color: var(--ink-3); }
  .search svg { flex: 0 0 auto; color: var(--ink-2); }

  /* ---------- Page title ---------- */
  .page-title { font-size: 32px; font-weight: 900; letter-spacing: -.8px; margin: 22px 4px 4px; line-height: 1.08; }

  /* ---------- Category circles ---------- */
  .cat-row { display: flex; gap: 16px; overflow-x: auto; padding: 18px 4px 6px; -ms-overflow-style: none; scrollbar-width: none; }
  .cat-row::-webkit-scrollbar { display: none; }
  .cat-chip { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 9px; cursor: pointer; width: 70px; }
  .cat-circle {
    width: 66px; height: 66px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 31px; box-shadow: var(--shadow); border: 3px solid transparent;
    transition: transform .25s cubic-bezier(.16,1,.3,1), border-color .2s;
  }
  .cat-chip:hover .cat-circle { transform: translateY(-3px); }
  .cat-chip.active .cat-circle { border-color: var(--accent); transform: scale(1.06); }
  .cat-cap { font-size: 12.5px; font-weight: 600; color: var(--ink-2); white-space: nowrap; }
  .cat-chip.active .cat-cap { color: var(--ink); font-weight: 800; }

  /* ---------- List meta ---------- */
  .list-meta { display: flex; align-items: baseline; gap: 9px; margin-top: var(--s-3); padding: 0 6px; }
  .list-meta .count { font-size: 24px; font-weight: 900; color: var(--ink); }
  .list-meta .label { font-size: 13.5px; color: var(--ink-2); font-weight: 500; }

  /* ---------- Recipe cards ---------- */
  .grid { display: grid; grid-template-columns: 1fr; gap: var(--s-2); margin-top: 14px; }
  @media (min-width: 680px) { .grid { grid-template-columns: 1fr 1fr; gap: var(--s-3); } }
  .rcard {
    position: relative; overflow: hidden; border-radius: var(--r-card); padding: 22px 24px;
    min-height: 188px; cursor: pointer; box-shadow: var(--shadow); display: flex; flex-direction: column;
    transition: transform .2s cubic-bezier(.16,1,.3,1), box-shadow .2s;
  }
  .rcard:hover { transform: translateY(-4px); box-shadow: var(--shadow-lift); }
  .rcard:active { transform: translateY(0) scale(.99); }
  .rcard.in { animation: cardIn .5s cubic-bezier(.16,1,.3,1) both; animation-delay: calc(var(--index) * 55ms); }
  @keyframes cardIn { from { opacity: 0; translate: 0 16px; } to { opacity: 1; translate: 0 0; } }
  @media (prefers-reduced-motion: reduce) { .rcard.in { animation: none; } }
  .rcard .rcat { font-size: 13px; font-weight: 700; color: rgba(28,28,36,.5); position: relative; z-index: 2; }
  .rcard h3 {
    margin: 7px 0 0; font-size: 26px; font-weight: 900; letter-spacing: -.6px; line-height: 1.12;
    color: var(--ink); max-width: 60%; position: relative; z-index: 2;
  }
  .rcard .rmeta { display: flex; align-items: center; gap: 8px; margin-top: auto; padding-top: 14px; position: relative; z-index: 2; flex-wrap: wrap; }
  .rcard .rmeta .chip-meta { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: rgba(28,28,36,.7);
    background: rgba(255,255,255,.55); padding: 6px 12px; border-radius: var(--r-full); }
  .rcard .rmeta .chip-meta svg { width: 14px; height: 14px; }
  .rcard .rmeta .chip-meta.warn { color: #9a3324; }
  /* corner art */
  .rcard-art { position: absolute; bottom: -16px; left: -10px; width: 152px; height: 152px; z-index: 1; pointer-events: none; }
  .rcard-art.emoji { font-size: 110px; line-height: 1; display: flex; align-items: flex-end; justify-content: center;
    filter: drop-shadow(0 12px 16px rgba(0,0,0,.18)); transition: transform .35s cubic-bezier(.16,1,.3,1); }
  .rcard:hover .rcard-art.emoji { transform: scale(1.08) rotate(-5deg); }
  .rcard-art.photo { border-radius: 50%; overflow: hidden; box-shadow: var(--shadow-art); border: 5px solid rgba(255,255,255,.6); bottom: -8px; left: -6px; width: 138px; height: 138px; }
  .rcard-art.photo img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s cubic-bezier(.16,1,.3,1); }
  .rcard:hover .rcard-art.photo img { transform: scale(1.1); }

  /* ---------- Empty ---------- */
  .empty { text-align: center; padding: 80px 20px; color: var(--ink-2); }
  .empty .big { font-size: 64px; }
  .empty h2 { color: var(--ink); margin: 14px 0 6px; font-size: 24px; font-weight: 900; }
  .empty p { margin: 0; font-size: 14px; }

  /* ---------- FAB ---------- */
  .fab {
    position: fixed; left: 20px; bottom: calc(22px + env(safe-area-inset-bottom)); z-index: 30;
    height: 58px; padding: 0 24px; border-radius: var(--r-full); border: 0; cursor: pointer;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 800; font-family: inherit;
    box-shadow: 0 16px 32px -12px rgba(91,75,214,.75); transition: transform .14s cubic-bezier(.16,1,.3,1), box-shadow .2s;
    display: flex; align-items: center; gap: 9px;
  }
  .fab:hover { transform: translateY(-2px); }
  .fab:active { transform: translateY(0) scale(.95); }
  .fab svg { width: 20px; height: 20px; }

  /* ---------- Sheet ---------- */
  .overlay { position: fixed; inset: 0; z-index: 40; background: rgba(28,28,40,.45); display: none; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  @media (min-width: 640px) { .overlay { align-items: center; } }
  .sheet {
    background: var(--bg); width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto;
    border-radius: var(--r-xl) var(--r-xl) 0 0; padding: 10px 20px calc(34px + env(safe-area-inset-bottom));
    animation: slideUp .3s cubic-bezier(.16,1,.3,1);
  }
  @media (min-width: 640px) { .sheet { border-radius: var(--r-xl); } }
  @keyframes slideUp { from { transform: translateY(40px); opacity: .4; } to { transform: translateY(0); opacity: 1; } }
  .grabber { width: 44px; height: 5px; background: #dcdce6; border-radius: var(--r-full); margin: 8px auto 16px; }
  .sheet-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .sheet-head h2 { font-size: 26px; margin: 0; flex: 1; font-weight: 900; letter-spacing: -.5px; color: var(--ink); }
  .sheet-head .eyebrow { font-size: 13px; color: var(--ink-2); font-weight: 600; flex: 1; }
  .icon-btn { background: var(--surface); border: 0; box-shadow: var(--shadow); border-radius: var(--r-md); width: 40px; height: 40px; cursor: pointer; color: var(--ink); display: flex; align-items: center; justify-content: center; transition: transform .12s; }
  .icon-btn:active { transform: scale(.93); }

  /* ---------- Form ---------- */
  label { display: block; font-size: 13px; font-weight: 700; margin: 18px 0 7px; color: var(--ink); }
  input[type=text], textarea, select {
    width: 100%; border: 1.5px solid var(--line); background: var(--surface); color: var(--ink);
    border-radius: var(--r-md); padding: 13px 15px; font-size: 15px; font-family: inherit; outline: 0; transition: border-color .15s;
  }
  input::placeholder, textarea::placeholder { color: var(--ink-3); }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 96px; line-height: 1.6; }
  .hint { font-size: 12.5px; color: var(--ink-2); margin-top: 6px; }
  .row { display: flex; gap: 12px; }
  .row > * { flex: 1; }
  .btn {
    width: 100%; margin-top: var(--s-3); border: 0; border-radius: var(--r-md); padding: 16px;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit;
    transition: opacity .15s, transform .12s cubic-bezier(.16,1,.3,1);
  }
  .btn:hover { opacity: .93; }
  .btn:active { transform: scale(.98); }
  .btn.ghost { background: transparent; color: #d24b3a; border: 1.5px solid var(--line); margin-top: 10px; }
  .btn.ghost:hover { background: #fcebe8; opacity: 1; }

  /* ---------- Smart paste ---------- */
  .smart { background: var(--accent-soft); border-radius: var(--r-lg); padding: 18px; margin: var(--s-2) 0 4px; }
  .smart-label { font-size: 15px; font-weight: 800; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .smart-label svg { width: 18px; height: 18px; }
  .smart textarea { border: 1.5px solid #d9d2f7; background: rgba(255,255,255,.75); }
  .smart .btn { margin-top: 12px; }
  .smart .ok { font-size: 13.5px; font-weight: 700; color: #2f7d54; margin-top: 11px; display: none; align-items: center; gap: 7px; }
  .smart .ok.show { display: flex; }
  .smart .ok svg { width: 16px; height: 16px; }
  .divider { display: flex; align-items: center; gap: 12px; color: var(--ink-3); font-size: 12.5px; margin: var(--s-3) 0 0; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  /* ---------- Photo uploader ---------- */
  .photo-up { margin-top: 7px; }
  .photo-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    height: 130px; border: 1.5px dashed #d9d2f7; border-radius: var(--r-md);
    background: var(--accent-soft); color: var(--accent); font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .photo-empty svg { width: 26px; height: 26px; }
  .photo-preview { position: relative; }
  .photo-preview img { width: 100%; height: 180px; object-fit: cover; border-radius: var(--r-md); display: block; }
  .photo-remove {
    position: absolute; top: 10px; left: 10px; border: 0; cursor: pointer;
    background: rgba(28,28,40,.72); color: #fff; font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 7px 13px; border-radius: var(--r-full); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  }

  /* ---------- Detail ---------- */
  .detail-hero {
    position: relative; overflow: hidden; border-radius: var(--r-xl); padding: 26px 24px 26px;
    margin: 6px 0 var(--s-3); min-height: 180px; box-shadow: var(--shadow);
  }
  .detail-hero .rcat { font-size: 14px; font-weight: 700; color: rgba(28,28,36,.55); position: relative; z-index: 2; }
  .detail-hero h2 { margin: 8px 0 0; font-size: 32px; font-weight: 900; letter-spacing: -.7px; line-height: 1.1; color: var(--ink); max-width: 62%; position: relative; z-index: 2; }
  .detail-hero .meta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; position: relative; z-index: 2; }
  .detail-hero .chip-meta { display: inline-flex; align-items: center; gap: 7px; font-size: 13.5px; font-weight: 700; color: rgba(28,28,36,.75); background: rgba(255,255,255,.6); padding: 8px 14px; border-radius: var(--r-full); }
  .detail-hero .chip-meta svg { width: 15px; height: 15px; }
  .detail-hero .chip-meta.warn { color: #9a3324; }
  .detail-art { position: absolute; bottom: -18px; left: -12px; width: 170px; height: 170px; z-index: 1; }
  .detail-art.emoji { font-size: 128px; line-height: 1; display: flex; align-items: flex-end; justify-content: center; filter: drop-shadow(0 14px 18px rgba(0,0,0,.2)); }
  .detail-art.photo { border-radius: 50%; overflow: hidden; box-shadow: var(--shadow-art); border: 6px solid rgba(255,255,255,.65); bottom: -10px; left: -8px; width: 152px; height: 152px; }
  .detail-art.photo img { width: 100%; height: 100%; object-fit: cover; }
  .section { background: var(--surface); border-radius: var(--r-lg); padding: 20px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .section h4 { margin: 0 0 12px; font-size: 19px; color: var(--ink); font-weight: 900; letter-spacing: -.3px; display: flex; align-items: center; gap: 9px; }
  .section h4 .bar { width: 5px; height: 19px; border-radius: var(--r-full); background: var(--accent); }
  .section .body { font-size: 15px; white-space: pre-wrap; line-height: 1.75; color: #3a3a46; }
  .allergen-box { background: #fcece8; }
  .allergen-box h4 { color: #c2402c; }
  .allergen-box h4 .bar { background: #c2402c; }
  .allergen-box .body { color: #9a3a28; }
  .detail-actions { display: flex; gap: 12px; margin-top: 6px; }
  .detail-actions .btn { margin-top: 0; }
  .detail-actions .btn.sec { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); }
</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">ODA</div>
      <button class="h-btn" id="addBtnTop" aria-label="הוספת מתכון">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div class="search">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="חיפוש מתכונים או מרכיבים…" aria-label="חיפוש" />
    </div>
  </header>

  <div class="wrap">
    <h1 class="page-title">המתכונים שלנו</h1>
    <div class="cat-row" id="catSelector"></div>
    <div class="list-meta" id="listMeta" style="display:none"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      <div class="big">🥣</div>
      <h2>עדיין אין מתכונים</h2>
      <p>הקש/י על "מתכון חדש" כדי להתחיל.</p>
    </div>
  </div>

  <button class="fab" id="addBtn" aria-label="הוספת מתכון">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    מתכון חדש
  </button>

  <!-- Form sheet -->
  <div class="overlay" id="formOverlay">
    <div class="sheet">
      <div class="grabber"></div>
      <div class="sheet-head">
        <h2 id="formTitle">מתכון חדש</h2>
        <button class="icon-btn" id="formClose" aria-label="סגירה">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="recipeForm">
        <input type="hidden" id="f-id" />

        <div class="smart" id="smartBox">
          <div class="smart-label">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 2l1.7 4.6L17 8l-4.3 1.4L11 14l-1.7-4.6L5 8l4.3-1.4z"/><path d="M18 13l.9 2.4L21 16l-2.1.6L18 19l-.9-2.4L15 16l2.1-.6z"/></svg>
            הדבקה חכמה
          </div>
          <textarea id="f-paste" placeholder="הדביקו כאן מתכון שלם (מכל מקום) — ואני אזהה ואמלא את כל השדות למטה באופן אוטומטי."></textarea>
          <button type="button" class="btn" id="parseBtn">מלא/י את השדות אוטומטית</button>
          <div class="ok" id="parseOk">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            זיהיתי ומילאתי! אפשר לבדוק ולתקן למטה.
          </div>
        </div>
        <div class="divider">או מלאו ידנית</div>

        <label>תמונה</label>
        <div class="photo-up">
          <input type="file" id="f-photo-input" accept="image/*" hidden />
          <div class="photo-empty" id="photoEmpty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L8 6H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-4z"/><circle cx="12" cy="13" r="3.5"/></svg>
            הוספת תמונה מהמכשיר
          </div>
          <div class="photo-preview" id="photoPreview" style="display:none">
            <img id="photoImg" alt="" />
            <button type="button" class="photo-remove" id="photoRemove">הסרה</button>
          </div>
        </div>

        <label for="f-name">שם המתכון</label>
        <input type="text" id="f-name" placeholder="לדוגמה: מחית בטטה ותפוח" required />

        <div class="row">
          <div>
            <label for="f-cat">קטגוריה</label>
            <select id="f-cat">
              <option>מחית / פירה</option>
              <option>ארוחת בוקר</option>
              <option>ארוחת צהריים</option>
              <option>ארוחת ערב</option>
              <option>חטיפים</option>
              <option>אוכל באצבעות</option>
              <option>משקאות ושייקים</option>
              <option>אחר</option>
            </select>
          </div>
          <div>
            <label for="f-emoji">אייקון</label>
            <input type="text" id="f-emoji" placeholder="🍠" maxlength="2" />
          </div>
        </div>

        <label for="f-age">טווח גיל</label>
        <select id="f-age">
          <option value="">— רשות —</option>
          <option>4–6 חודשים</option>
          <option>6–9 חודשים</option>
          <option>9–12 חודשים</option>
          <option>12+ חודשים</option>
        </select>

        <label for="f-ingredients">מרכיבים</label>
        <textarea id="f-ingredients" placeholder="מרכיב אחד בכל שורה…&#10;1 בטטה&#10;1 תפוח"></textarea>
        <div class="hint">טיפ: כתבו כל מרכיב בשורה נפרדת.</div>

        <label for="f-steps">הוראות הכנה</label>
        <textarea id="f-steps" placeholder="1. לקלף ולחתוך…&#10;2. לאדות עד שמתרכך…"></textarea>

        <label for="f-allergens">אלרגנים</label>
        <input type="text" id="f-allergens" placeholder="לדוגמה: חלב, ביצה (מופרד בפסיקים)" />

        <label for="f-notes">הערות</label>
        <textarea id="f-notes" placeholder="התינוק/ת אהב/ה! / מתאים להקפאה / להוסיף קינמון בפעם הבאה"></textarea>

        <button type="submit" class="btn" id="saveBtn">שמירת מתכון</button>
      </form>
    </div>
  </div>

  <!-- Detail sheet -->
  <div class="overlay" id="detailOverlay">
    <div class="sheet">
      <div class="grabber"></div>
      <div class="sheet-head">
        <span class="eyebrow">מתכון</span>
        <button class="icon-btn" id="detailClose" aria-label="סגירה">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="detail" id="detailBody"></div>
    </div>
  </div>

<script>
(function () {
  "use strict";
  var KEY = "littleBites.recipes.he.v1";
  var CATEGORIES = ["מחית / פירה","ארוחת בוקר","ארוחת צהריים","ארוחת ערב","חטיפים","אוכל באצבעות","משקאות ושייקים","אחר"];
  var ALL = "הכול";
  var activeCat = ALL;
  var query = "";

  // category pastels + emoji + short caption
  var CAT_BG = {
    "מחית / פירה": "#ffe2cf", "ארוחת בוקר": "#fdf0c0", "ארוחת צהריים": "#d8f0c8", "ארוחת ערב": "#e2dcff",
    "חטיפים": "#ffd9e6", "אוכל באצבעות": "#c9eee7", "משקאות ושייקים": "#d9e3ff", "אחר": "#e9e6f1"
  };
  var CAT_EMOJI = {
    "מחית / פירה": "🥣", "ארוחת בוקר": "🥞", "ארוחת צהריים": "🍲", "ארוחת ערב": "🌙",
    "חטיפים": "🍪", "אוכל באצבעות": "🥕", "משקאות ושייקים": "🥤", "אחר": "🍽️"
  };
  var CAT_SHORT = {
    "מחית / פירה": "מחית", "ארוחת בוקר": "בוקר", "ארוחת צהריים": "צהריים", "ארוחת ערב": "ערב",
    "חטיפים": "חטיפים", "אוכל באצבעות": "אצבעות", "משקאות ושייקים": "משקאות", "אחר": "אחר"
  };
  function catBg(c) { return c === ALL ? "#e9e6f1" : (CAT_BG[c] || CAT_BG["אחר"]); }
  function catEmoji(c) { return c === ALL ? "✨" : (CAT_EMOJI[c] || "🍽️"); }

  var ICO_WARN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>';
  var ICO_AGE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
  var ICO_LIST = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>';

  // ---------- storage ----------
  function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch (e) { return []; } }
  function save(list) {
    try { localStorage.setItem(KEY, JSON.stringify(list)); return true; }
    catch (e) { alert("אין מספיק מקום לשמירה במכשיר. נסי תמונות קטנות יותר, או למחוק כמה מתכונים."); return false; }
  }
  if (localStorage.getItem(KEY) === null) {
    save([
      { id: uid(), name: "מחית בטטה ותפוח", cat: "מחית / פירה", emoji: "🍠", age: "4–6 חודשים",
        ingredients: "1 בטטה קטנה\n1 תפוח\nמעט מים או חלב אם",
        steps: "1. לקלף ולחתוך את הבטטה והתפוח.\n2. לאדות 10–12 דקות עד שמתרכך מאוד.\n3. לטחון עד למרקם חלק, לדלל במעט מים.",
        allergens: "", notes: "מתאים להקפאה בתבניות קרח." },
      { id: uid(), name: "אצבעות בננה ושיבולת שועל", cat: "אוכל באצבעות", emoji: "🍌", age: "9–12 חודשים",
        ingredients: "1 בננה בשלה\n1 כוס שיבולת שועל\n1 ביצה",
        steps: "1. למעוך את הבננה ולערבב עם שיבולת השועל והביצה.\n2. לפרוס בתבנית ולאפות 18 דקות ב־180°C.\n3. לחתוך לאצבעות לאחר קירור.",
        allergens: "ביצה, גלוטן", notes: "מצוין לתרגול אכילה עצמאית." }
    ]);
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  // ---------- elements ----------
  var grid = document.getElementById("grid");
  var empty = document.getElementById("empty");
  var catSelector = document.getElementById("catSelector");
  var listMeta = document.getElementById("listMeta");
  var searchInput = document.getElementById("search");
  var formOverlay = document.getElementById("formOverlay");
  var detailOverlay = document.getElementById("detailOverlay");
  var form = document.getElementById("recipeForm");

  function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function art(r, cls) {
    if (r.photo) return '<div class="' + cls + ' photo"><img src="' + r.photo + '" alt="" loading="lazy"></div>';
    var e = r.emoji || catEmoji(r.cat);
    return '<div class="' + cls + ' emoji">' + esc(e) + '</div>';
  }

  // ---------- category circles ----------
  var chips = [];
  function catCount(c) { return load().filter(function (r) { return c === ALL || r.cat === c; }).length; }
  function buildCats() {
    var items = [ALL].concat(CATEGORIES);
    catSelector.innerHTML = "";
    chips = items.map(function (c) {
      var el = document.createElement("div");
      el.className = "cat-chip" + (c === activeCat ? " active" : "");
      el.dataset.cat = c;
      el.innerHTML =
        '<div class="cat-circle" style="background:' + catBg(c) + '">' + catEmoji(c) + '</div>' +
        '<div class="cat-cap">' + esc(c === ALL ? "הכול" : (CAT_SHORT[c] || c)) + '</div>';
      el.onclick = function () { if (activeCat !== c) { activeCat = c; syncCats(); renderGrid(true); } };
      catSelector.appendChild(el);
      return el;
    });
  }
  function syncCats() { chips.forEach(function (el) { el.classList.toggle("active", el.dataset.cat === activeCat); }); }

  // ---------- grid ----------
  function matches(r) {
    if (activeCat !== ALL && r.cat !== activeCat) return false;
    if (!query) return true;
    var hay = (r.name + " " + r.cat + " " + r.ingredients + " " + (r.allergens||"") + " " + (r.notes||"")).toLowerCase();
    return hay.indexOf(query) !== -1;
  }
  function renderGrid(animate) {
    if (animate === undefined) animate = true;
    var list = load().filter(matches).sort(function(a,b){ return a.name.localeCompare(b.name, "he"); });
    grid.innerHTML = "";
    if (list.length === 0) { empty.style.display = "block"; listMeta.style.display = "none"; return; }
    empty.style.display = "none";

    listMeta.style.display = "flex";
    listMeta.innerHTML = '<span class="count">' + list.length + '</span>' +
      '<span class="label">' + (list.length === 1 ? "מתכון" : "מתכונים") +
      (activeCat !== ALL ? " · " + esc(activeCat) : "") + '</span>';

    list.forEach(function (r, i) {
      var card = document.createElement("div");
      card.className = "rcard" + (animate ? " in" : "");
      card.style.setProperty("--index", i);
      card.style.background = catBg(r.cat);

      var meta = "";
      if (r.age) meta += '<span class="chip-meta">' + ICO_AGE + esc(r.age) + '</span>';
      else {
        var n = (r.ingredients || "").split("\n").filter(Boolean).length;
        if (n) meta += '<span class="chip-meta">' + ICO_LIST + n + ' מרכיבים</span>';
      }
      var allCount = (r.allergens||"").split(",").map(function(s){return s.trim();}).filter(Boolean).length;
      if (allCount) meta += '<span class="chip-meta warn">' + ICO_WARN + allCount + ' אלרגנים</span>';

      card.innerHTML =
        '<div class="rcat">' + esc(r.cat) + '</div>' +
        '<h3>' + esc(r.name) + '</h3>' +
        '<div class="rmeta">' + meta + '</div>' +
        art(r, "rcard-art");
      card.onclick = function () { openDetail(r.id); };
      grid.appendChild(card);
    });
  }

  // ---------- detail ----------
  function openDetail(id) {
    var r = load().filter(function (x) { return x.id === id; })[0];
    if (!r) return;
    var body = document.getElementById("detailBody");

    var meta = "";
    if (r.age) meta += '<span class="chip-meta">' + ICO_AGE + esc(r.age) + '</span>';
    var allCount = (r.allergens||"").split(",").map(function(s){return s.trim();}).filter(Boolean).length;
    if (allCount) meta += '<span class="chip-meta warn">' + ICO_WARN + allCount + ' אלרגנים</span>';

    var ingHtml = r.ingredients ? '<div class="section"><h4><span class="bar"></span>מרכיבים</h4><div class="body">' + esc(r.ingredients) + '</div></div>' : '';
    var stepHtml = r.steps ? '<div class="section"><h4><span class="bar"></span>הוראות הכנה</h4><div class="body">' + esc(r.steps) + '</div></div>' : '';
    var allHtml = (r.allergens && r.allergens.trim()) ? '<div class="section allergen-box"><h4><span class="bar"></span>אלרגנים</h4><div class="body">' + esc(r.allergens) + '</div></div>' : '';
    var noteHtml = (r.notes && r.notes.trim()) ? '<div class="section"><h4><span class="bar"></span>הערות</h4><div class="body">' + esc(r.notes) + '</div></div>' : '';

    body.innerHTML =
      '<div class="detail-hero" style="background:' + catBg(r.cat) + '">' +
        '<div class="rcat">' + esc(r.cat) + '</div>' +
        '<h2>' + esc(r.name) + '</h2>' +
        (meta ? '<div class="meta-row">' + meta + '</div>' : '') +
        art(r, "detail-art") +
      '</div>' +
      ingHtml + stepHtml + allHtml + noteHtml +
      '<div class="detail-actions">' +
        '<button class="btn sec" id="editBtn">עריכה</button>' +
        '<button class="btn ghost" id="delBtn" style="margin-top:0">מחיקה</button>' +
      '</div>';

    document.getElementById("editBtn").onclick = function () { closeOverlay(detailOverlay); openForm(r); };
    document.getElementById("delBtn").onclick = function () {
      if (confirm('למחוק את "' + r.name + '"?')) {
        save(load().filter(function (x) { return x.id !== r.id; }));
        closeOverlay(detailOverlay); renderGrid();
      }
    };
    openOverlay(detailOverlay);
  }

  // ---------- photo ----------
  var currentPhoto = "";
  var photoInput = document.getElementById("f-photo-input");
  var photoEmpty = document.getElementById("photoEmpty");
  var photoPreview = document.getElementById("photoPreview");
  var photoImg = document.getElementById("photoImg");
  function showPhoto() {
    if (currentPhoto) { photoImg.src = currentPhoto; photoPreview.style.display = "block"; photoEmpty.style.display = "none"; }
    else { photoPreview.style.display = "none"; photoEmpty.style.display = "flex"; }
  }
  function resizeImage(file, cb) {
    var reader = new FileReader();
    reader.onload = function (e) {
      var img = new Image();
      img.onload = function () {
        var max = 1000, w = img.width, h = img.height;
        if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
        else if (h >= w && h > max) { w = Math.round(w * max / h); h = max; }
        var c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        cb(c.toDataURL("image/jpeg", 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
  photoEmpty.onclick = function () { photoInput.click(); };
  photoInput.onchange = function () {
    var f = this.files && this.files[0];
    if (f) resizeImage(f, function (d) { currentPhoto = d; showPhoto(); });
    this.value = "";
  };
  document.getElementById("photoRemove").onclick = function () { currentPhoto = ""; showPhoto(); };

  // ---------- form ----------
  function openForm(r) {
    document.getElementById("formTitle").textContent = r ? "עריכת מתכון" : "מתכון חדש";
    document.getElementById("f-id").value = r ? r.id : "";
    document.getElementById("f-name").value = r ? r.name : "";
    document.getElementById("f-cat").value = r ? r.cat : "מחית / פירה";
    document.getElementById("f-emoji").value = r ? (r.emoji||"") : "";
    document.getElementById("f-age").value = r ? (r.age||"") : "";
    document.getElementById("f-ingredients").value = r ? (r.ingredients||"") : "";
    document.getElementById("f-steps").value = r ? (r.steps||"") : "";
    document.getElementById("f-allergens").value = r ? (r.allergens||"") : "";
    document.getElementById("f-notes").value = r ? (r.notes||"") : "";
    currentPhoto = r ? (r.photo || "") : "";
    showPhoto();
    document.getElementById("f-paste").value = "";
    document.getElementById("parseOk").classList.remove("show");
    openOverlay(formOverlay);
  }

  // ---------- smart paste parser ----------
  var HEADERS = {
    ingredients: ["מרכיבים","חומרים","מצרכים","רכיבים","ingredients"],
    steps: ["הוראות הכנה","אופן ההכנה","אופן הכנה","הוראות","שלבים","הכנה","אופן","method","steps","directions","instructions","preparation"],
    allergens: ["אלרגנים","אלרגן","אלרגניים","מכיל","contains","allergens","allergy"],
    notes: ["הערות","הערה","טיפים","טיפ","notes","tip","tips"]
  };
  function detectHeader(line) {
    var colon = line.search(/[:：]/);
    var head = colon >= 0 ? line.slice(0, colon) : line;
    var rest = colon >= 0 ? line.slice(colon + 1).trim() : "";
    var key = head.replace(/[•\-\*\d\.\)\(]/g, "").trim().toLowerCase();
    for (var t in HEADERS) {
      if (HEADERS[t].indexOf(key) !== -1 && (colon >= 0 || key === line.trim().toLowerCase())) {
        return { type: t, inline: rest };
      }
    }
    return null;
  }
  function parseRecipe(text) {
    var res = { name: "", cat: "", age: "", ingredients: "", steps: "", allergens: "", notes: "" };
    if (!text || !text.trim()) return res;
    var lines = text.replace(/\r/g, "").split("\n").map(function (l) { return l.trim(); });
    while (lines.length && lines[0] === "") lines.shift();
    var name = "", section = null, pre = [];
    var buckets = { ingredients: [], steps: [], allergens: [], notes: [] };
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line === "") continue;
      var h = detectHeader(line);
      if (h) { section = h.type; if (h.inline) buckets[section].push(h.inline); continue; }
      if (name === "") { name = line; continue; }
      if (section) buckets[section].push(line); else pre.push(line);
    }
    var hasSections = buckets.ingredients.length || buckets.steps.length || buckets.allergens.length || buckets.notes.length;
    if (!hasSections) { buckets.ingredients = pre; }
    else if (pre.length) { buckets.notes = pre.concat(buckets.notes); }
    res.name = name;
    res.ingredients = buckets.ingredients.join("\n").trim();
    res.steps = buckets.steps.join("\n").trim();
    res.allergens = buckets.allergens.join(", ").trim();
    res.notes = buckets.notes.join("\n").trim();
    var ages = ["4–6 חודשים", "6–9 חודשים", "9–12 חודשים", "12+ חודשים"];
    if (/חודש|month/i.test(text)) {
      var m = text.match(/(\d{1,2})\s*[-–—]\s*(\d{1,2})/);
      if (m) {
        var a = m[1] + "–" + m[2];
        if (a === "4–6") res.age = ages[0];
        else if (a === "6–9") res.age = ages[1];
        else if (a === "9–12") res.age = ages[2];
      }
      if (!res.age && /12\s*\+|12\s*חודש/.test(text)) res.age = ages[3];
    }
    var catMap = [
      [/מחית|פירה|פיורה/, "מחית / פירה"], [/בוקר|דייסה/, "ארוחת בוקר"],
      [/צהרי/, "ארוחת צהריים"], [/ערב/, "ארוחת ערב"], [/חטיף/, "חטיפים"],
      [/אצבע|פינגר|finger/i, "אוכל באצבעות"], [/שייק|smoothie|משקה|משקאות/i, "משקאות ושייקים"]
    ];
    for (var c = 0; c < catMap.length; c++) {
      if (catMap[c][0].test(name) || catMap[c][0].test(text)) { res.cat = catMap[c][1]; break; }
    }
    return res;
  }
  function applyParsed() {
    var text = document.getElementById("f-paste").value;
    var p = parseRecipe(text);
    if (!p.name && !p.ingredients) return;
    if (p.name) document.getElementById("f-name").value = p.name;
    if (p.cat) document.getElementById("f-cat").value = p.cat;
    if (p.age) document.getElementById("f-age").value = p.age;
    if (p.ingredients) document.getElementById("f-ingredients").value = p.ingredients;
    if (p.steps) document.getElementById("f-steps").value = p.steps;
    if (p.allergens) document.getElementById("f-allergens").value = p.allergens;
    if (p.notes) document.getElementById("f-notes").value = p.notes;
    document.getElementById("parseOk").classList.add("show");
  }
  document.getElementById("parseBtn").onclick = applyParsed;
  document.getElementById("f-paste").addEventListener("paste", function () { setTimeout(applyParsed, 30); });

  form.onsubmit = function (e) {
    e.preventDefault();
    var id = document.getElementById("f-id").value;
    var rec = {
      id: id || uid(),
      name: document.getElementById("f-name").value.trim(),
      cat: document.getElementById("f-cat").value,
      emoji: document.getElementById("f-emoji").value.trim(),
      age: document.getElementById("f-age").value,
      ingredients: document.getElementById("f-ingredients").value.trim(),
      steps: document.getElementById("f-steps").value.trim(),
      allergens: document.getElementById("f-allergens").value.trim(),
      notes: document.getElementById("f-notes").value.trim(),
      photo: currentPhoto
    };
    if (!rec.name) return;
    var list = load();
    if (id) { list = list.map(function (x) { return x.id === id ? rec : x; }); }
    else { list.push(rec); }
    if (save(list) === false) return;
    closeOverlay(formOverlay);
    renderGrid();
  };

  // ---------- overlays ----------
  function openOverlay(o) { o.classList.add("open"); document.body.style.overflow = "hidden"; }
  function closeOverlay(o) { o.classList.remove("open"); document.body.style.overflow = ""; }
  document.getElementById("addBtn").onclick = function () { openForm(null); };
  document.getElementById("addBtnTop").onclick = function () { openForm(null); };
  document.getElementById("formClose").onclick = function () { closeOverlay(formOverlay); };
  document.getElementById("detailClose").onclick = function () { closeOverlay(detailOverlay); };
  [formOverlay, detailOverlay].forEach(function (o) {
    o.addEventListener("click", function (e) { if (e.target === o) closeOverlay(o); });
  });
  searchInput.oninput = function () { query = this.value.trim().toLowerCase(); renderGrid(false); };

  buildCats();
  renderGrid();
})();
</script>
</body>
</html>
